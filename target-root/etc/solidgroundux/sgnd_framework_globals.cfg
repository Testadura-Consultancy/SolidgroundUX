# Framework-wide system configuration directory
SGND_SYSCFG_DIR=/home/sysadmin/dev/SolidgroundUX/target-root/etc/solidgroundux

# Framework-wide documentation directory
SGND_DOCS_DIR=/home/sysadmin/dev/SolidgroundUX/target-root/usr/local/share/doc/solidgroundux

# Enable or disable logfile output
SGND_LOGFILE_ENABLED=0

# Console output level (off, quiet, normal, debug)
SGND_LOG_LEVEL=normal

# Primary log file or directory path
SGND_LOG_PATH=/home/sysadmin/dev/SolidgroundUX/target-root/var/log/solidgroundux.log

# Alternate log path override
SGND_ALTLOG_PATH=/home/sysadmin/.log/solidgroundux.log

# Maximum log file size before rotation
SGND_LOG_MAX_BYTES=26214400

# Number of rotated log files to retain
SGND_LOG_KEEP=20

# Compress rotated log files
SGND_LOG_COMPRESS=1

# Default UI style file (basename or path)
SGND_UI_STYLE=default-ui-style.sh

# Default UI palette file (basename or path)
SGND_UI_PALETTE=default-ui-palette.sh

