<div class="ct-functionheader">sgnd_visible_length</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Measure the character length of text after stripping ANSI escape sequences.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  TEXT</div>
<div class="ct-functionbody">Output:</div>
<div class="ct-functionbody">  Prints the stripped character count to stdout.</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 always.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_visible_length TEXT</div>
