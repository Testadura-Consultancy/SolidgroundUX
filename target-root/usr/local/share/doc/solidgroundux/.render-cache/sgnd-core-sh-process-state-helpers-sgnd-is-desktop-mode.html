<div class="ct-functionheader">sgnd_is_desktop_mode</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Detect whether a graphical desktop environment is available.</div>
<div class="ct-functionbody">Behavior:</div>
<div class="ct-functionbody">  - Detects X11 or Wayland session</div>
<div class="ct-functionbody">  - Does not guarantee UI interactivity (separate concern)</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 if desktop environment is available</div>
<div class="ct-functionbody">  1 otherwise</div>
