<div class="ct-functionheader">sgnd_wrap_words</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Wrap a text string to a fixed width on word boundaries.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  --width N</div>
<div class="ct-functionbody">  --text STR</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 on success, including empty text.</div>
<div class="ct-functionbody">  2 on invalid arguments.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_wrap_words --width N --text STR</div>
