<div class="ct-functionheader">sgnd_default</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Assign a default value to a variable when it is unset or empty.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  VAR_NAME</div>
<div class="ct-functionbody">  $2  DEFAULT</div>
<div class="ct-functionbody">Side effects:</div>
<div class="ct-functionbody">  - Sets the target variable in the current shell.</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 always.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_default VAR_NAME DEFAULT</div>
