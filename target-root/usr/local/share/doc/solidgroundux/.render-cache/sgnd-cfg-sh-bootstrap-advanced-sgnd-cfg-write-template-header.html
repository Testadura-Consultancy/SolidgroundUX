<div class="ct-functionheader">_sgnd_cfg_write_template_header</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Write a standard auto-generated header for a cfg template file.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  DOMAIN</div>
<div class="ct-functionbody">      Logical config domain name.</div>
<div class="ct-functionbody">  $2  AUDIENCE</div>
<div class="ct-functionbody">      Config audience: system or user.</div>
<div class="ct-functionbody">Output:</div>
<div class="ct-functionbody">  Prints header text to stdout.</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 always.</div>
