<div class="ct-functionheader">_sgnd_kv_has</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Test whether a KEY exists in a KEY=VALUE file (even if empty).</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  File path.</div>
<div class="ct-functionbody">  $2  Key (must be a valid identifier).</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 if present,</div>
<div class="ct-functionbody">  1 if not present,</div>
<div class="ct-functionbody">  2 on argument/read error.</div>
