<div class="ct-functionheader">_sgnd_ensure_linebreak</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Ensure progress output is terminated before normal output continues.</div>
<div class="ct-functionbody">Behavior:</div>
<div class="ct-functionbody">  - Prints a newline if a progress line is still active.</div>
<div class="ct-functionbody">  - Resets the pending linebreak flag.</div>
<div class="ct-functionbody">Inputs (globals):</div>
<div class="ct-functionbody">  SGND_LINEBREAK_PENDING</div>
<div class="ct-functionbody">Outputs (globals):</div>
<div class="ct-functionbody">  SGND_LINEBREAK_PENDING</div>
