<div class="ct-functionheader">sgnd_print_args</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Print a formatted overview of parsed arguments and their current values.</div>
<div class="ct-functionbody">Inputs (globals):</div>
<div class="ct-functionbody">  SGND_ARGS_SPEC</div>
<div class="ct-functionbody">  SGND_BUILTIN_ARGS</div>
<div class="ct-functionbody">  SGND_POSITIONAL</div>
<div class="ct-functionbody">Outputs:</div>
<div class="ct-functionbody">  Prints formatted argument overview.</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 always.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_print_args</div>
