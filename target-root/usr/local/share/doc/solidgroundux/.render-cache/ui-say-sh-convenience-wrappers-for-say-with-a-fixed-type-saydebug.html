<div class="ct-functionheader">saydebug</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Emit a DEBUG message with caller context.</div>
<div class="ct-functionbody">Behavior:</div>
<div class="ct-functionbody">  - Only active when SGND_LOG_LEVEL=debug.</div>
<div class="ct-functionbody">  - Appends caller file, function, and line.</div>
<div class="ct-functionbody">  - Delegates to say DEBUG.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  saydebug "quot;Value = $x"quot;</div>
<div class="ct-functionbody">Examples:</div>
<div class="ct-functionbody">  saydebug "quot;Entering function"quot;</div>
