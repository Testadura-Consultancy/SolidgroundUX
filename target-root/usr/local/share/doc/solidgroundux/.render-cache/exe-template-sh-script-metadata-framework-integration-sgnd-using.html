<div class="ct-variableheader">SGND_USING</div>
<div class="ct-variablebody">Libraries to source from SGND_COMMON_LIB.</div>
<div class="ct-variablebody">These are loaded automatically by sgnd_bootstrap AFTER core libraries.</div>
<div class="ct-variablebody">Example:</div>
<div class="ct-variablebody">  SGND_USING=( net.sh fs.sh )</div>
<div class="ct-variablebody">Leave empty if no extra libs are needed.</div>
