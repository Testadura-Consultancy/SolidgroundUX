<div class="ct-functionheader">sgnd_caller_id</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Build a compact caller identifier string for diagnostics.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  DEPTH</div>
<div class="ct-functionbody">      Optional stack depth. Default: 1</div>
<div class="ct-functionbody">Output:</div>
<div class="ct-functionbody">  Prints the caller identifier to stdout.</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 always.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_caller_id [DEPTH]</div>
