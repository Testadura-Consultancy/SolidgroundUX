<div class="ct-functionheader">sgnd_array_union</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Build a stable union of one or more source arrays into a destination array.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  DEST_ARRAY name.</div>
<div class="ct-functionbody">  $@  One or more SRC_ARRAY names.</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 on success; 1 on invalid arguments.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_array_union DEST_ARRAY SRC_ARRAY [SRC_ARRAY ...]</div>
