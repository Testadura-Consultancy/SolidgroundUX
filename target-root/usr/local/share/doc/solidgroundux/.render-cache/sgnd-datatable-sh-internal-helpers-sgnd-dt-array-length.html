<div class="ct-functionheader">sgnd_dt_array_length</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Return the length of an indexed array by name.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  ARRAY_NAME</div>
<div class="ct-functionbody">Outputs:</div>
<div class="ct-functionbody">  Prints array length to stdout.</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 on success.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_dt_array_length ARRAY_NAME</div>
<div class="ct-functionbody">Examples:</div>
<div class="ct-functionbody">  count="quot;$(sgnd_dt_array_length MY_ROWS)"quot;</div>
