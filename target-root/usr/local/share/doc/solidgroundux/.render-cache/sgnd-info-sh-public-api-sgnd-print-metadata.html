<div class="ct-functionheader">sgnd_print_metadata</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Print script identity and build metadata.</div>
<div class="ct-functionbody">Inputs (globals):</div>
<div class="ct-functionbody">  SGND_SCRIPT_FILE</div>
<div class="ct-functionbody">  SGND_SCRIPT_DESC</div>
<div class="ct-functionbody">  SGND_SCRIPT_DIR</div>
<div class="ct-functionbody">  SGND_SCRIPT_VERSION</div>
<div class="ct-functionbody">  SGND_SCRIPT_BUILD</div>
<div class="ct-functionbody">Outputs:</div>
<div class="ct-functionbody">  Prints formatted metadata values.</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 always.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_print_metadata</div>
