<div class="ct-functionheader">sgnd_is_ui_mode</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Determine whether the current execution context supports interactive UI.</div>
<div class="ct-functionbody">Behavior:</div>
<div class="ct-functionbody">  - Honors explicit runmode flags when present</div>
<div class="ct-functionbody">  - Falls back to TTY detection</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 if UI mode is active</div>
<div class="ct-functionbody">  1 otherwise</div>
