<div class="ct-L3Sectionheader">Script metadata (framework integration)</div>
<div class="ct-L3Sectionbody">SGND_USING</div>
<div class="ct-L3Sectionbody">Libraries to source from SGND_COMMON_LIB.</div>
<div class="ct-L3Sectionbody">These are loaded automatically by sgnd_bootstrap AFTER core libraries.</div>
<div class="ct-L3Sectionbody">Example:</div>
<div class="ct-L3Sectionbody">  SGND_USING=( net.sh fs.sh )</div>
<div class="ct-L3Sectionbody">Leave empty if no extra libs are needed.</div>
