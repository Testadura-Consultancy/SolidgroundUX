<div class="ct-functionheader">sgnd_dt_insert</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Append a row string to a table array.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  SCHEMA</div>
<div class="ct-functionbody">  $2  TABLE_ARRAY_NAME</div>
<div class="ct-functionbody">  $3  ROW</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 on success.</div>
<div class="ct-functionbody">  1 on invalid schema or row width mismatch.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_dt_insert "quot;$SCHEMA"quot; ARRAY_NAME ROW</div>
