<div class="ct-functionheader">sgnd_dt_delete</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Delete one row from a table array by index.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  TABLE_ARRAY_NAME</div>
<div class="ct-functionbody">  $2  ROW_INDEX</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 on success.</div>
<div class="ct-functionbody">  1 on invalid row index.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_dt_delete TABLE_ARRAY_NAME ROW_INDEX</div>
