<div class="ct-functionheader">sgnd_die</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Terminate the script with a formatted fatal error message.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  MESSAGE</div>
<div class="ct-functionbody">  $2  RC</div>
<div class="ct-functionbody">Inputs (globals):</div>
<div class="ct-functionbody">  FLAG_VERBOSE</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  Does not return.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_die [MESSAGE] [RC]</div>
