<div class="ct-functionheader">saycancel</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Emit a CNCL message.</div>
<div class="ct-functionbody">Behavior:</div>
<div class="ct-functionbody">  - Delegates to say CNCL.</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 always.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  saycancel "quot;Cancelled by user"quot;</div>
<div class="ct-functionbody">Examples:</div>
<div class="ct-functionbody">  saycancel "quot;Operation aborted"quot;</div>
