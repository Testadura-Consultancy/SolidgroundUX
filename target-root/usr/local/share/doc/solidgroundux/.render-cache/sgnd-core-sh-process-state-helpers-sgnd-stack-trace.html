<div class="ct-functionheader">sgnd_stack_trace</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Print a simple stack trace with the most recent caller first.</div>
<div class="ct-functionbody">Output:</div>
<div class="ct-functionbody">  Prints stack trace lines to stdout.</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 always.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_stack_trace</div>
