<div class="ct-variableheader">SGND_CORE_LIBS</div>
<div class="ct-variablebody">Purpose:</div>
<div class="ct-variablebody">  Define the core libraries that sgnd-bootstrap loads in fixed order.</div>
<div class="ct-variablebody">Notes:</div>
<div class="ct-variablebody">  - Ordering is part of the bootstrap contract.</div>
<div class="ct-variablebody">  - Earlier libraries may be required by later ones.</div>
