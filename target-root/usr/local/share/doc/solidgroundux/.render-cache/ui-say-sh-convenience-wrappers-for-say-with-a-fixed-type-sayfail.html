<div class="ct-functionheader">sayfail</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Emit a FAIL message.</div>
<div class="ct-functionbody">Behavior:</div>
<div class="ct-functionbody">  - Delegates to say FAIL.</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 always.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sayfail "quot;Cannot create directory: $dir"quot;</div>
<div class="ct-functionbody">Examples:</div>
<div class="ct-functionbody">  sayfail "quot;Bootstrap failed"quot;</div>
