<div class="ct-variableheader">SGND_SCRIPT_EXAMPLES</div>
<div class="ct-variablebody">Optional: examples for --help output.</div>
<div class="ct-variablebody">Each entry is a string that will be printed verbatim.</div>
<div class="ct-variablebody">Example:</div>
<div class="ct-variablebody">  SGND_SCRIPT_EXAMPLES=(</div>
<div class="ct-variablebody">      "quot;Example usage:"quot;</div>
<div class="ct-variablebody">      "quot;  script.sh --verbose --mode fast"quot;</div>
<div class="ct-variablebody">      "quot;  script.sh -v -m slow"quot;</div>
<div class="ct-variablebody">  )</div>
<div class="ct-variablebody">Leave empty if no examples are needed.</div>
