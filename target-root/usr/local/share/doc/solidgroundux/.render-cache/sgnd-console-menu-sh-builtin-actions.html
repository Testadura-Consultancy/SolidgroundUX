<div class="ct-L3Sectionheader">Builtin actions</div>
<div class="ct-L3Sectionbody">_sgnd_console_toggle_clearonrender</div>
<div class="ct-L3Sectionbody">Purpose:</div>
<div class="ct-L3Sectionbody">  Toggle whether the console clears the screen before each render.</div>
<div class="ct-L3Sectionbody">Behavior:</div>
<div class="ct-L3Sectionbody">  - Flips SGND_CLEAR_ONRENDER between 0 and 1.</div>
<div class="ct-L3Sectionbody">  - Emits an informational message reflecting the new state.</div>
<div class="ct-L3Sectionbody">Returns:</div>
<div class="ct-L3Sectionbody">  0 always</div>
