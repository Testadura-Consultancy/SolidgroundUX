<div class="ct-functionheader">sgnd_retry</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Retry a command up to N times with a delay between attempts.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  ATTEMPTS</div>
<div class="ct-functionbody">  $2  DELAY_SECONDS</div>
<div class="ct-functionbody">  $@  COMMAND</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 if the command succeeds within the retry budget.</div>
<div class="ct-functionbody">  1 if all attempts fail.</div>
<div class="ct-functionbody">  2 on invalid arguments.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_retry ATTEMPTS DELAY COMMAND [ARG ...]</div>
