<div class="ct-functionheader">sgnd_safe_replace_file</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Replace a destination file with a source file while preserving mode bits.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  SRC</div>
<div class="ct-functionbody">  $2  DST</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 on success; 1 on failure.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_safe_replace_file SRC DST</div>
