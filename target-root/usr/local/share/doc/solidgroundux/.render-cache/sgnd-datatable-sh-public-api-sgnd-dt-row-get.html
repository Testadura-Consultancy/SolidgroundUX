<div class="ct-functionheader">sgnd_dt_row_get</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Get the value of one column from a row string.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  SCHEMA</div>
<div class="ct-functionbody">  $2  ROW</div>
<div class="ct-functionbody">  $3  COLUMN_NAME</div>
<div class="ct-functionbody">Outputs:</div>
<div class="ct-functionbody">  Prints the field value to stdout.</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 on success.</div>
<div class="ct-functionbody">  1 if the column is not found.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_dt_row_get "quot;$SCHEMA"quot; "quot;$ROW"quot; COLUMN_NAME</div>
