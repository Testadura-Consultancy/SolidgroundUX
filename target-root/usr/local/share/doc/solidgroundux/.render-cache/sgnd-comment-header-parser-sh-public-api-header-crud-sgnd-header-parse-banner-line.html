<div class="ct-functionheader">sgnd_header_parse_banner_line</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Extract product and title from a single header banner line.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  LINE</div>
<div class="ct-functionbody">  $2  PRODUCT_VAR</div>
<div class="ct-functionbody">  $3  TITLE_VAR</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 if parsed</div>
<div class="ct-functionbody">  1 otherwise</div>
