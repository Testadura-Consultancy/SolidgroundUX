<div class="ct-functionheader">_ask_decision_map_dlg_rc</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Map ask_dlg_autocontinue return codes to a canonical decision when possible.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  RC</div>
<div class="ct-functionbody">  $2  CHOICES</div>
<div class="ct-functionbody">  $3  DEFAULT</div>
<div class="ct-functionbody">Output:</div>
<div class="ct-functionbody">  Writes canonical decision token to stdout when mapped.</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 if mapped</div>
<div class="ct-functionbody">  1 if no mapping applies and typed fallback should be used</div>
