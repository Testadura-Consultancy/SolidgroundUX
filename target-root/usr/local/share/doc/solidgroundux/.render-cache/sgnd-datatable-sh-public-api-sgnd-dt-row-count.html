<div class="ct-functionheader">sgnd_dt_row_count</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Return the number of rows in a table array.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  TABLE_ARRAY_NAME</div>
<div class="ct-functionbody">Outputs:</div>
<div class="ct-functionbody">  Prints row count to stdout.</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 on success.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_dt_row_count TABLE_ARRAY_NAME</div>
