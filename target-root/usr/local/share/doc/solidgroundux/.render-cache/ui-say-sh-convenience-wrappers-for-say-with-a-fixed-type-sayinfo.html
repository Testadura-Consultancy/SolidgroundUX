<div class="ct-functionheader">sayinfo</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Emit an INFO message.</div>
<div class="ct-functionbody">Behavior:</div>
<div class="ct-functionbody">  - Delegates to say INFO.</div>
<div class="ct-functionbody">  -             #   - Always returns 0, even when suppressed.</div>
<div class="ct-functionbody">Inputs (globals):</div>
<div class="ct-functionbody">  SGND_LOG_LEVEL</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 always.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sayinfo "quot;Loading optional libraries..."quot;</div>
<div class="ct-functionbody">Examples:</div>
<div class="ct-functionbody">  sayinfo "quot;Using default configuration"quot;</div>
