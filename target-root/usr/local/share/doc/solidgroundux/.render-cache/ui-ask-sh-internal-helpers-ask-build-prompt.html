<div class="ct-functionheader">_ask_build_prompt</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Build a readline-safe prompt with visible-width padding and optional colors.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  LABEL</div>
<div class="ct-functionbody">  $2  LABELWIDTH</div>
<div class="ct-functionbody">  $3  PAD</div>
<div class="ct-functionbody">  $4  LABELCLR</div>
<div class="ct-functionbody">  $5  INPUTCLR</div>
<div class="ct-functionbody">  $6  COLORIZE</div>
<div class="ct-functionbody">Output:</div>
<div class="ct-functionbody">  Writes the composed prompt string to stdout.</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 always.</div>
