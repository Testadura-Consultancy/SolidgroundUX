<div class="ct-functionheader">sgnd_print_framework_metadata</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Print framework identity and versioning metadata.</div>
<div class="ct-functionbody">Inputs (globals):</div>
<div class="ct-functionbody">  SGND_PRODUCT</div>
<div class="ct-functionbody">  SGND_VERSION</div>
<div class="ct-functionbody">  SGND_VERSION_DATE</div>
<div class="ct-functionbody">  SGND_COMPANY</div>
<div class="ct-functionbody">  SGND_COPYRIGHT</div>
<div class="ct-functionbody">  SGND_LICENSE</div>
<div class="ct-functionbody">Outputs:</div>
<div class="ct-functionbody">  Prints formatted metadata values.</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 always.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_print_framework_metadata</div>
