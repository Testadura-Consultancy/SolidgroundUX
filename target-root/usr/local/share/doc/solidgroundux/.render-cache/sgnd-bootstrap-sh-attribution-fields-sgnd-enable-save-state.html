<div class="ct-functionheader">sgnd_enable_save_state</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Enable automatic state persistence.</div>
<div class="ct-functionbody">Behavior:</div>
<div class="ct-functionbody">  - Sets SGND_STATE_SAVE=1.</div>
<div class="ct-functionbody">  - Allows sgnd_save_state to execute when invoked.</div>
