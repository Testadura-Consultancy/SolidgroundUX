<div class="ct-functionheader">sgnd_ensure_dir</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Ensure a directory exists.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  Directory path.</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 on success.</div>
<div class="ct-functionbody">  2 if the argument is missing.</div>
<div class="ct-functionbody">  Otherwise mkdir'#39;s exit status.</div>
<div class="ct-functionbody">Usage:</div>
<div class="ct-functionbody">  sgnd_ensure_dir DIR</div>
