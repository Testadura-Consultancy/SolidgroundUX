<div class="ct-functionheader">_ask_choice_is_valid</div>
<div class="ct-functionbody">Purpose:</div>
<div class="ct-functionbody">  Validate a single choice against a ask_choose-style choices list.</div>
<div class="ct-functionbody">Arguments:</div>
<div class="ct-functionbody">  $1  VALUE</div>
<div class="ct-functionbody">  $2  CHOICES</div>
<div class="ct-functionbody">Returns:</div>
<div class="ct-functionbody">  0 if valid</div>
<div class="ct-functionbody">  1 if invalid</div>
